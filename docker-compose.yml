# INFRA-01 — Ambiente local: Postgres+PostGIS + MinIO
# Sobe os datastores que o backend SGEV consome.
# O backend roda localmente via `mvn spring-boot:run` apontando para estes serviços.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sisgev-postgres
    environment:
      POSTGRES_DB: sgev
      POSTGRES_USER: sgev
      POSTGRES_PASSWORD: sgev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgev -d sgev"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio
    container_name: sisgev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - miniodata:/data

  # Job one-shot: cria o bucket de evidências assim que o MinIO sobe.
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'aguardando minio...'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/sgev-evidences;
      /usr/bin/mc anonymous set download local/sgev-evidences;
      echo 'bucket sgev-evidences pronto';
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
