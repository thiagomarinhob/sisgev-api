spring.application.name=sisgev

# ---- Datasource (defaults apontam para o docker-compose) ----
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sgev}
spring.datasource.username=${DATABASE_USERNAME:sgev}
spring.datasource.password=${DATABASE_PASSWORD:sgev}

# ---- JPA (schema gerenciado pelo Flyway, não pelo Hibernate) ----
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ---- JWT ----
jwt.secret=${JWT_SECRET:c2lzZ2V2LWRldi1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2LWFsZ29yaXRobS0yMDI2}
jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:30}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# ---- CORS ----
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- Storage (MinIO / S3) ----
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.bucket=${STORAGE_BUCKET:sgev-evidences}
storage.public-url=${STORAGE_PUBLIC_URL:http://localhost:9000}

# ---- Upload (multipart) ----
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# ---- Geo ----
geo.near-segment-radius-meters=${GEO_NEAR_SEGMENT_RADIUS_METERS:100}
